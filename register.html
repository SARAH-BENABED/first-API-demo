<!DOCTYPE html>

<html>

    <head>

       <title>Register</title>

       <link rel="stylesheet" href="styles/registerLogin.css">

    </head>

    <body>
        
        <div class="container">
            <h1 class="heading">Start Managing Your Patients</h1>
    
            <h2 class="heading"> Register </h2>

            <form id="registerForm">
                <input type="email" id="email" class="input" placeholder="Enter email" required />
                <br /><br />
                <input type="password" id="password" class="input" placeholder="Enter password"  required />
                <br /><br />
                <p id="errorMsg"></p>
                <br />
                <button type="submit" class="submit-btn">Register</button>

            </form>

            <p>
                Already have an account ? 
                <a href="index.html">Login here</a>
            </p>

        </div>

        <script src="register.js"></script>

    </body>

</html>
