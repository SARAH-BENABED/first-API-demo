<!DOCTYPE html>

<html>

    <head>

       <title>Login</title>

       <link rel="stylesheet" href="styles/registerLogin.css">

    </head>

    <body>

        <div class="container">

            <h1 class="heading">Start Managing Your Patients</h1>
  
            <h2 class="heading"> Login </h2>

            <form id="loginForm">
                <input type="email" id="email" class="input" placeholder="Enter email" required />
                <br /><br />
                <input type="password" id="password" class="input" placeholder="Enter password"  required />
                <br /><br />
                <p id="errorMsg"></p>
                <br />
                <button type="submit" class="submit-btn">Login</button>

            </form>

            <p>
                Don't have an account ?
                <a href="register.html">Register here</a>
            </p>

        </div>

        <script src="login.js"></script>

    </body>

</html>
